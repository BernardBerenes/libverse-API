<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Borrowing Confirmed</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background-color: #4f46e5; padding: 32px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 28px; }
        .body { padding: 32px; color: #374151; }
        .body h2 { font-size: 20px; margin-top: 0; }
        .body p { line-height: 1.6; }
        .detail-card { background-color: #f9fafb; border-radius: 8px; padding: 20px 24px; margin-top: 24px; }
        .detail-card table { width: 100%; border-collapse: collapse; }
        .detail-card td { padding: 8px 0; font-size: 14px; color: #374151; }
        .detail-card td:first-child { font-weight: bold; color: #6b7280; width: 40%; }
        .badge { display: inline-block; padding: 4px 12px; background-color: #dbeafe; color: #1d4ed8; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .warning { margin-top: 24px; padding: 12px 16px; background-color: #fef3c7; border-left: 4px solid #f59e0b; border-radius: 4px; font-size: 14px; color: #92400e; }
        .footer { padding: 20px 32px; background-color: #f9fafb; text-align: center; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Libverse</h1>
        </div>
        <div class="body">
            <h2>Borrowing Confirmed! 📚</h2>
            <p>Hi <strong th:text="${name}">User</strong>, your borrowing request has been successfully submitted.</p>

            <div class="detail-card">
                <table>
                    <tr>
                        <td>Book Title</td>
                        <td th:text="${book_title}">-</td>
                    </tr>
                    <tr>
                        <td>Author</td>
                        <td th:text="${author_name}">-</td>
                    </tr>
                    <tr>
                        <td>ISBN</td>
                        <td th:text="${isbn}">-</td>
                    </tr>
                    <tr>
                        <td>Borrow Date</td>
                        <td th:text="${borrow_date}">-</td>
                    </tr>
                    <tr>
                        <td>Due Date</td>
                        <td th:text="${due_date}">-</td>
                    </tr>
                    <tr>
                        <td>Status</td>
                        <td><span class="badge" th:text="${status}">PENDING</span></td>
                    </tr>
                </table>
            </div>

            <div class="warning">
                ⚠️ Please return the book before or on the due date to avoid any penalties.
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Libverse. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
