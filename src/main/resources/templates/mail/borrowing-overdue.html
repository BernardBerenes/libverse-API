<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Overdue Notice</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background-color: #dc2626; padding: 32px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 28px; }
        .body { padding: 32px; color: #374151; }
        .body h2 { font-size: 20px; margin-top: 0; color: #dc2626; }
        .body p { line-height: 1.6; }
        .detail-card { background-color: #fef2f2; border-radius: 8px; padding: 20px 24px; margin-top: 24px; border: 1px solid #fecaca; }
        .detail-card table { width: 100%; border-collapse: collapse; }
        .detail-card td { padding: 8px 0; font-size: 14px; color: #374151; }
        .detail-card td:first-child { font-weight: bold; color: #6b7280; width: 40%; }
        .badge { display: inline-block; padding: 4px 12px; background-color: #fee2e2; color: #dc2626; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .alert { margin-top: 24px; padding: 16px; background-color: #fef2f2; border-left: 4px solid #dc2626; border-radius: 4px; font-size: 14px; color: #991b1b; }
        .footer { padding: 20px 32px; background-color: #f9fafb; text-align: center; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Libverse</h1>
        </div>
        <div class="body">
            <h2>⚠️ Overdue Notice</h2>
            <p>Hi <strong th:text="${name}">User</strong>, your borrowed book is now overdue. Please return it immediately.</p>

            <div class="detail-card">
                <table>
                    <tr>
                        <td>Book Title</td>
                        <td th:text="${book_title}">-</td>
                    </tr>
                    <tr>
                        <td>Due Date</td>
                        <td th:text="${due_date}">-</td>
                    </tr>
                    <tr>
                        <td>Overdue</td>
                        <td><span class="badge" th:text="${overdue_days} + ' days'">-</span></td>
                    </tr>
                    <tr>
                        <td>Status</td>
                        <td><span class="badge">OVERDUE</span></td>
                    </tr>
                </table>
            </div>

            <div class="alert">
                🚨 Please return the book as soon as possible to avoid further penalties.
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Libverse. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
